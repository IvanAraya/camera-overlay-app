<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superposición de Imagen sobre Cámara</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Camera Overlay">
    <meta name="application-name" content="Camera Overlay">
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-TileImage" content="assets/icon-144.png">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- PWA Icons -->
    <link rel="apple-touch-icon" sizes="72x72" href="assets/icon-72.png">
    <link rel="apple-touch-icon" sizes="96x96" href="assets/icon-96.png">
    <link rel="apple-touch-icon" sizes="128x128" href="assets/icon-128.png">
    <link rel="apple-touch-icon" sizes="144x144" href="assets/icon-144.png">
    <link rel="apple-touch-icon" sizes="192x192" href="assets/icon-192.png">
    <link rel="icon" sizes="192x192" href="assets/icon-192.png">
    <link rel="icon" sizes="512x512" href="assets/icon-512.png">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/bootstrap-custom.css">
    
    <style>
        /* Layout específico para este diseño */
        .camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        #cameraVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            cursor: move;
            touch-action: none;
            z-index: 100;
        }

        /* Panel superior izquierdo - Zoom de cámara */
        .top-controls {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.5rem;
            z-index: 1000;
            display: flex;
            gap: 0.25rem;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
        }

        /* Indicador superior derecho - Cámara actual */
        .camera-indicator {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 0.4rem 0.8rem;
            z-index: 1000;
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
        }

        /* Botones de zoom compactos */
        .zoom-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #667eea;
            transform: scale(1.05);
        }

        /* Panel inferior - Controles principales */
        .bottom-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 1rem;
            z-index: 1000;
            display: flex;
            gap: 1rem;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Panel de configuración desplegable */
        .settings-panel {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            z-index: 999;
            min-width: 300px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease-in-out;
            opacity: 0;
            pointer-events: none;
        }

        .settings-panel.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* Indicadores */
        .gesture-hint {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 500;
            text-align: center;
        }

        
        /* Botón de imagen */
        .image-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-btn:hover {
            background: #5a67d8;
            transform: scale(1.1);
        }

        /* Slider de opacidad */
        .opacity-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .opacity-slider {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        .opacity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: 2px solid white;
        }

        .opacity-value {
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }

        /* Botón de settings */
        .settings-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #667eea;
            transform: rotate(90deg);
        }

        /* Controles del panel de settings */
        .settings-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .settings-control {
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: space-between;
        }

        .settings-label {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 80px;
        }

        .settings-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        .settings-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: 2px solid white;
        }

        .settings-value {
            color: #667eea;
            font-size: 0.8rem;
            font-weight: 600;
            min-width: 50px;
            text-align: center;
        }

        .settings-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .settings-btn-small {
            padding: 0.5rem 1rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .settings-btn-small:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .settings-btn-danger {
            background: #dc3545;
        }

        .settings-btn-danger:hover {
            background: #c82333;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .top-controls {
                top: 10px;
                left: 10px;
                padding: 0.4rem;
                gap: 0.2rem;
            }

            .zoom-btn {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }

            .camera-indicator {
                top: 10px;
                right: 10px;
                padding: 0.3rem 0.6rem;
                font-size: 0.7rem;
            }

            .bottom-controls {
                bottom: 15px;
                padding: 0.75rem;
                gap: 0.75rem;
            }

            .opacity-slider {
                width: 100px;
            }

            .settings-panel {
                bottom: 80px;
                min-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="camera-container">
        <video id="cameraVideo" autoplay playsinline></video>
        <canvas id="overlayCanvas"></canvas>
        
        <!-- Panel superior - Zoom de cámara -->
        <div class="top-controls">
            <button class="zoom-btn" id="cameraZoomInBtn" title="Acercar cámara">
                <i class="bi bi-zoom-in"></i>
            </button>
            <button class="zoom-btn" id="cameraZoomOutBtn" title="Alejar cámara">
                <i class="bi bi-zoom-out"></i>
            </button>
            <button class="zoom-btn" id="cameraZoomResetBtn" title="Resetear zoom">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
        </div>
        
        <!-- Indicadores -->
        <div class="gesture-hint d-none" id="gestureHint">
            <span>Arrastra • Pellizca • Ctrl+Rueda</span>
        </div>
        
        <div class="camera-indicator" id="cameraIndicator">
            <span class="badge bg-primary" id="cameraType">📷 Trasera</span>
        </div>
        
        <!-- Panel inferior - Controles principales -->
        <div class="bottom-controls">
            <!-- Botón para cargar imagen -->
            <div class="file-input-wrapper">
                <input type="file" id="imageUpload" accept="image/*" class="d-none">
                <label for="imageUpload" class="image-btn">
                    <i class="bi bi-image"></i>
                </label>
            </div>
            
            <!-- Slider de opacidad -->
            <div class="opacity-control">
                <i class="bi bi-droplet text-white"></i>
                <input type="range" id="opacitySlider" min="0" max="100" value="100" class="opacity-slider">
                <span class="opacity-value" id="opacityValue">100%</span>
            </div>
            
            <!-- Botón de settings -->
            <button class="settings-btn" id="settingsBtn" title="Configuración">
                <i class="bi bi-gear"></i>
            </button>
        </div>

        <!-- Panel de configuración desplegable -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-controls">
                <!-- Control de rotación -->
                <div class="settings-control">
                    <span class="settings-label">Rotación</span>
                    <input type="range" id="rotationSlider" min="0" max="360" value="0" class="settings-slider">
                    <span class="settings-value" id="rotationValue">0°</span>
                </div>
                
                <!-- Botones de acción -->
                <div class="settings-buttons">
                    <button class="settings-btn-small" id="centerImageBtn">
                        <i class="bi bi-crosshair"></i> Centrar
                    </button>
                    <button class="settings-btn-small" id="switchCameraBtn">
                        <i class="bi bi-camera"></i> Cámara
                    </button>
                    <button class="settings-btn-small settings-btn-danger" id="clearImageBtn">
                        <i class="bi bi-trash"></i> Borrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Mensajes de estado -->
    <div id="statusMessage"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- App JS -->
    <script src="js/app.js"></script>
</body>
</html>
